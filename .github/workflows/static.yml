name: Deploy static content to Pages

on:
  push:
    branches: ["main"] # Укажите вашу ветку, если она называется master, поменяйте на master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Точка означает, что деплоится корень репозитория. Если у вас билд (например, папка dist), укажите её.

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5